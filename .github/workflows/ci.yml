name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax checks
        run: |
          bash -n deploy.sh
          bash -n access.sh

      - name: Python syntax checks
        run: |
          python -m py_compile main.py
          python -m py_compile remote_tunnel.py
          python -m py_compile local_proxy.py
